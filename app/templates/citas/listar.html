{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between">
    <h2><i class="fas fa-calendar-alt"></i> Agenda de citas</h2>
    <a href="{{ url_for('citas.nueva') }}" class="btn btn-success">+ Nueva cita</a>
</div>
<div class="table-responsive mt-3">
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr><th>Paciente</th><th>Fecha y hora</th><th>Motivo</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody>
            {% for c in citas %}
            <tr>
                <td>{{ c.paciente.nombre }}</td>
                <td>{{ c.fecha_hora.strftime('%d/%m/%Y %H:%M') }}</td>
                <td>{{ c.motivo or '-' }}</td>
                <td>
                    <span class="badge {% if c.estado == 'programada' %}bg-primary{% elif c.estado == 'realizada' %}bg-success{% else %}bg-danger{% endif %}">
                        {{ c.estado }}
                    </span>
                </td>
                <td>
                    <a href="{{ url_for('citas.editar', id=c.id) }}" class="btn btn-sm btn-warning">Editar</a>
                    <a href="{{ url_for('citas.eliminar', id=c.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('¿Cancelar cita?')">Cancelar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
